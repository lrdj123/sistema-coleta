<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Coleta</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>♻️ Sistema de Coleta de Materiais</h1>
            <p>Escolha uma área para acessar</p>
        </header>
        
        <div class="cards">
            <a href="/cliente" class="card card-cliente">
                <div class="card-icon">👤</div>
                <h2>Área do Cliente</h2>
                <p>Agende sua coleta de materiais</p>
            </a>
            
            <a href="/funcionario" class="card card-func">
                <div class="card-icon">👷</div>
                <h2>Área do Funcionário</h2>
                <p>Registre coletas no local</p>
            </a>
            
            <a href="/admin" class="card card-admin">
                <div class="card-icon">📊</div>
                <h2>Administrativo</h2>
                <p>Painel de gestão da empresa</p>
            </a>
        </div>
    </div>
</body>
</html>
