<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JF Sucata - Sistema de Coleta</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="bg-marca">
        <div class="bg-logo-texto">JF SUCATA</div>
        <div class="bg-logo-sub">♻️ Reciclagem</div>
    </div>
    <div class="container">
        <header>
            <h1>♻️ Sistema de Coleta</h1>
            <p>Escolha uma area para acessar</p>
        </header>
        
        <div class="cards">
            <a href="/cliente" class="card card-cliente">
                <div class="card-icon">👤</div>
                <h2>Area do Cliente</h2>
                <p>Solicite sua coleta de materiais</p>
            </a>
            
            <a href="/funcionario" class="card card-func">
                <div class="card-icon">👷</div>
                <h2>Area do Funcionario</h2>
                <p>Registre coletas no local</p>
            </a>
            
            <a href="/admin" class="card card-admin">
                <div class="card-icon">📊</div>
                <h2>Administrativo</h2>
                <p>Painel de gestao da empresa</p>
            </a>
        </div>
    </div>
</body>
</html>
